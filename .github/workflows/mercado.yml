name: Mercado Macro

# VIX, yield curve, Fear & Greed (acciones y cripto) e indicadores de EEUU
# (CPI/desempleo/tasa de la Fed). Es un solo request por fuente (no depende
# de la lista de tickers), asi que corre en el mismo horario que "Actualizar
# datos" sin costo extra relevante.

on:
  workflow_dispatch:

  schedule:
    - cron: '0 14 * * 1-5'   # ~apertura
    - cron: '0 18 * * 1-5'   # ~mediodia
    - cron: '0 21 * * 1-5'   # ~cierre

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Generar JSON
        run: python scripts/mercado_macro.py

      - name: Commitear datos si cambiaron
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/mercado_macro.json
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos."
            exit 0
          fi
          git commit -m "mercado: actualizacion automatica ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          # Otros workflows pushean a la misma rama en paralelo — reintenta con
          # rebase en vez de fallar el job entero y perder esta corrida.
          for intento in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rechazado (otra corrida pusheo antes) - intento $intento/5, reintentando..."
            git fetch origin main
            git rebase origin/main -X theirs
            sleep $((5 + RANDOM % 10))
          done
          echo "No se pudo pushear despues de varios intentos."
          exit 1
