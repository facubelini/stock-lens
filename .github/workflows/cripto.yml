name: Crypto Screener

# Snapshot del Crypto Screener 2 veces al dia, para ir armando un registro
# historico de precios/señales sin depender de que el usuario tenga la
# pestaña abierta. Corre en Node (no Python) porque reusa tal cual las
# funciones de src/lib/crypto/*, las mismas que usa la UI en el navegador —
# cero logica duplicada. Cripto opera 24/7, por eso el cron no distingue
# dias habiles ni horario de mercado (a diferencia de "Actualizar datos").

on:
  workflow_dispatch:

  schedule:
    - cron: '0 6 * * *'   # ~03:00 ART
    - cron: '0 18 * * *'  # ~15:00 ART

permissions:
  contents: write

jobs:
  escanear:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Correr el screener
        run: node scripts/crypto_screener.js

      - name: Commitear datos si cambiaron
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/crypto_screener.json public/data/crypto_historial.json
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "cripto: snapshot automatico ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
