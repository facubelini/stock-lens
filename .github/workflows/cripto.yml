name: Crypto Screener

# Snapshot del Crypto Screener 2 veces al dia, para ir armando un registro
# historico de precios/señales sin depender de que el usuario tenga la
# pestaña abierta. Corre en Node (no Python) porque reusa tal cual las
# funciones de src/lib/crypto/*, las mismas que usa la UI en el navegador —
# cero logica duplicada. Cripto opera 24/7, por eso el cron no distingue
# dias habiles ni horario de mercado (a diferencia de "Actualizar datos").

on:
  workflow_dispatch:

  schedule:
    - cron: '0 6 * * *'   # ~03:00 ART
    - cron: '0 18 * * *'  # ~15:00 ART

permissions:
  contents: write

jobs:
  escanear:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Correr el screener
        run: node scripts/crypto_screener.js

      - name: Commitear datos si cambiaron
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/crypto_screener.json public/data/crypto_historial.json
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos."
            exit 0
          fi
          git commit -m "cripto: snapshot automatico ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          # Otros workflows pushean a la misma rama en paralelo — reintenta con
          # rebase en vez de fallar el job entero y perder esta corrida.
          for intento in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rechazado (otra corrida pusheo antes) - intento $intento/5, reintentando..."
            git fetch origin main
            git rebase origin/main -X theirs
            sleep $((5 + RANDOM % 10))
          done
          echo "No se pudo pushear despues de varios intentos."
          exit 1
