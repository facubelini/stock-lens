name: Deploy a GitHub Pages

on:
  # Deploy ante cualquier push a main (codigo).
  push:
    branches: [main]

  # Deploy encadenado cuando termina "Actualizar datos".
  # Necesario porque los commits hechos con GITHUB_TOKEN NO disparan el evento
  # 'push' en otros workflows (salvaguarda anti-recursion de GitHub).
  workflow_run:
    workflows: ['Actualizar datos', 'Historico fundamental', 'Backtest Screener', 'Mercado Macro', 'Crypto Screener']
    types: [completed]

  # Disparo manual.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Si vino por workflow_run, solo continuar si el pipeline de datos fue exitoso.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
