name: Historico fundamental

# Corre el script de SEC EDGAR (P/E, EV/Sales, P/S "LTM") para los tickers de
# data/historico_tickers.json (maximo 10). Los fundamentals cambian solo
# trimestralmente, asi que no hace falta correrlo tan seguido como
# "Actualizar datos" (precio/RSI). El deploy se encadena solo, igual que ahi.

on:
  # Disparo manual (tambien lo dispara la app cuando agregas/sacas un ticker
  # de esta lista via la API de GitHub).
  workflow_dispatch:

  # Semanal alcanza de sobra (los balances no cambian todas las semanas).
  schedule:
    - cron: '0 12 * * 1'   # lunes al mediodia UTC

permissions:
  contents: write   # necesario para commitear el JSON generado

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Generar JSON
        run: python scripts/historico_fundamental.py

      - name: Commitear datos si cambiaron
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/historico_fundamental.json data/cik_cache.json
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos."
            exit 0
          fi
          git commit -m "historico: actualizacion automatica ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          # Otros workflows pushean a la misma rama en paralelo — reintenta con
          # rebase en vez de fallar el job entero y perder esta corrida.
          for intento in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rechazado (otra corrida pusheo antes) - intento $intento/5, reintentando..."
            git fetch origin main
            git rebase origin/main -X theirs
            sleep $((5 + RANDOM % 10))
          done
          echo "No se pudo pushear despues de varios intentos."
          exit 1
